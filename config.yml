# This is a simplified config where the rest of the settings are omitted and will be set by default.
# See https://gate.minekube.com/guide/config/ for the full configuration options.
config:
  bind: 0.0.0.0:25565
  onlineMode: true
  # /server visible to admins only (architecture.md 0.1節).
  requireBuiltinCommandPermissions: true
  # Unexpected disconnects from hardcore fall back to lobby automatically,
  # since hardcore is deliberately left out of `try` below (architecture.md 0.4節).
  failoverOnUnexpectedServerDisconnect: true
  forwarding:
    mode: velocity
    velocitySecret: ${GATE_VELOCITY_SECRET}
  servers:
    lobby: lobby:25566
    hardcore: hardcore:25567
  try:
    - lobby

# Hardcore Together Gate plugin config (architecture.md 4節).
hardcoreTogether:
  admins:
    - "11111111-2222-3333-4444-555555555555"
  managerAddr: manager:9000
  lobbyServer: lobby
  hardcoreServer: hardcore
